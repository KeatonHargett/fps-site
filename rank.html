  .navbar-links { margin-left: auto; }

    .navbar-social .nav-soc { width: 30px; height: 30px; }
    .navbar-social .nav-soc svg { width: 16px; height: 16px; }
  }
  @media (max-width: 480px) {
    .navbar-inner { gap: 0.5rem; }
    .navbar-brand .nb-logo { height: 32px; }
    .navbar-links { width: 100%; justify-content: center; order: 99; }
    .navbar-links a { font-size: 1rem; padding: 0.3rem 0.55rem; }

  .navbar-social { display: flex; gap: 0.4rem; align-items: center; margin-left: auto; }

  .bar-value { font-family: 'Bebas Neue', sans-serif; font-size: 0.95rem; line-height: 1; color: var(--dark); }

    const out = {};
    Object.entries(recs).forEach(([team, r]) => {
      const tot = r.w + r.l + r.t;
      if (tot >= 50) out[team] = { pct: (r.w + 0.5 * r.t) / tot, games: tot, w: r.w, l: r.l, t: r.t };
    });
    _winPctCache = out;
    return out;
  }

  function ordinal(n) {
    if (n == null || isNaN(n)) return '';
    const s = ['th','st','nd','rd'], v = n % 100;
    return n + (s[(v - 20) % 10] || s[v] || s[0]);
  }

  function formatValue(v, fmt) {
    if (v == null || isNaN(v)) return '—';
    if (fmt === 'pct3') return '.' + Math.round(v * 1000).toString().padStart(3, '0');
    if (fmt === 'pct1') return (v * 100).toFixed(1) + '%';
    return v.toLocaleString();
  }

  // ===== Build the ranked rows for the current category =====
  function buildRows() {
    const cat = CATEGORIES[currentCatSlug];
    let pairs = [];
    if (cat.live && cat.source === 'wins') {
      const w = liveWins();
      Object.entries(w).forEach(([team, value]) => pairs.push({ team, value }));
    } else if (cat.live && cat.source === 'winPct') {
      const wp = liveWinPct();
      Object.entries(wp).forEach(([team, info]) => pairs.push({ team, value: info.pct, sub: `${info.w}-${info.l}${info.t?'-'+info.t:''}` }));
    } else {
      Object.entries(TEAM_STATS).forEach(([team, s]) => {
        const value = s[cat.source];
        if (value == null) return;
        pairs.push({ team, value });
      });
    }
    // Only include FBS teams when we know who's FBS (fall back to all if no FBS list)
    if (TEAMS_LIVE.length > 0) {
      const fbsSet = new Set(TEAMS_LIVE);
      pairs = pairs.filter(p => fbsSet.has(p.team));
    }
    // Sort descending by value (higher = better)
    pairs.sort((a, b) => b.value - a.value);
    // Assign ranks with tie-handling (1, 1, 1, 4, 5...)
    let prevVal = null, prevRank = 0;
    pairs.forEach((p, i) => {
      if (p.value === prevVal) { p.rank = prevRank; }
      else { p.rank = i + 1; prevRank = p.rank; prevVal = p.value; }
    });
    return pairs;
  }

  // ===== Render hero + dropdown blurb =====
  function renderHeader() {
    const cat = CATEGORIES[currentCatSlug];
    document.title = `${cat.label} — Front Porch Sports`;
    document.getElementById('hero-title').innerHTML = `${cat.label.split(' ').slice(0,-1).join(' ')} <span class="accent">${cat.label.split(' ').slice(-1)[0]}</span>`;
    document.getElementById('hero-sub').textContent = cat.desc;
    document.getElementById('cat-blurb').textContent = cat.desc;
  }

  // ===== Render bar chart =====
  function renderChart(rows) {
    const cat = CATEGORIES[currentCatSlug];
    const top = rows.slice(0, 30);
    document.getElementById('chart-title').textContent = `Top ${top.length} Programs`;
    document.getElementById('chart-sub').textContent = `Bar height shows relative ${cat.short.toLowerCase()}. Scroll horizontally to see more.`;
    if (top.length === 0) {
      document.getElementById('bar-row').innerHTML = '<div class="rk-empty">No data for this category.</div>';
      return;
    }
    const maxVal = top[0].value;
    const html = top.map(p => {
      const m = META[p.team] || {};
      const color = m.color || '#003594';
      const heightPct = Math.max(4, (p.value / maxVal) * 240);
      const logo = LOGO_URL(m.id);
      return `<div class="bar-col">
        ${logo ? `<img class="bar-logo" src="${logo}" alt="" onerror="this.style.visibility='hidden'">` : '<div class="bar-logo"></div>'}
        <div class="bar-value">${formatValue(p.value, cat.fmt)}</div>
        <div class="bar" style="height:${heightPct}px;background:${color}"></div>
        <div class="bar-team">${p.team}</div>
        <div class="bar-rank">${ordinal(p.rank)}</div>
      </div>`;
    }).join('');
    document.getElementById('bar-row').innerHTML = html;
  }

  // ===== Render full table =====
  function renderTable(rows) {
    const cat = CATEGORIES[currentCatSlug];
    document.getElementById('th-value').firstChild.textContent = cat.short;
    const filtered = searchTerm ? rows.filter(r => r.team.toLowerCase().includes(searchTerm.toLowerCase())) : rows;
    document.getElementById('table-count').textContent = `${filtered.length} of ${rows.length} programs`;
    // Sort
    const sorted = [...filtered].sort((a, b) => {
      let av, bv;
      if (sortKey === 'rank') { av = a.rank; bv = b.rank; }
      else if (sortKey === 'team') { av = a.team; bv = b.team; }
      else { av = a.value; bv = b.value; }
      if (typeof av === 'string') return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
      return sortAsc ? av - bv : bv - av;
    });
    const tbody = document.getElementById('rk-tbody');
    if (sorted.length === 0) {
      tbody.innerHTML = `<tr><td colspan="3"><div class="rk-empty">No teams match your search.</div></td></tr>`;
      return;
    }
    tbody.innerHTML = sorted.map(p => {
      const m = META[p.team] || {};
      const color = m.color || '#6b7280';
      const logo = LOGO_URL(m.id);
      const conf = m.conference || '';
      return `<tr><td colspan="3"><a class="rk-row" data-team="${p.team}" href="team.html?team=${encodeURIComponent(p.team)}" style="border-left-color:${color}">
        <div class="rk-rank ${p.rank<=3?'top':''}">${ordinal(p.rank)}</div>
        ${logo ? `<img class="rk-logo" src="${logo}" alt="" onerror="this.style.visibility='hidden'">` : '<div class="rk-logo"></div>'}
        <div>
          <div class="rk-name" style="color:${color}">${p.team}</div>
          ${conf ? `<div class="rk-conf">${conf}</div>` : ''}
        </div>
        <div class="rk-value" style="color:${color}">${formatValue(p.value, cat.fmt)}</div>
      </a></td></tr>`;
    }).join('');
  }

  function renderAll() {
    if (!GAMES.length) return;
    _winsCache = null; _winPctCache = null;
    const rows = buildRows();
    renderHeader();
    renderChart(rows);
    renderTable(rows);
  }

  // Search + sort wiring
  document.getElementById('table-search').addEventListener('input', e => { searchTerm = e.target.value; const r = buildRows(); renderTable(r); });
  document.querySelectorAll('.rk-tab th[data-key]').forEach(th => {
    th.addEventListener('click', () => {
      const key = th.dataset.key;
      if (sortKey === key) sortAsc = !sortAsc;
      else { sortKey = key; sortAsc = (key !== 'team'); }
      document.querySelectorAll('.rk-tab th').forEach(t => t.classList.remove('sorted'));
      th.classList.add('sorted');
      const r = buildRows();
      renderTable(r);
    });
  });
</script>
</body>
</html>
