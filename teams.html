<style>
  :root {
    --orange: #fe5c00;
    --blue: #003594;
    --dark: #0d1117;
    --gray: #6b7280;
    --light: #f3f4f6;
    --border: #e5e7eb;
    --win-green: #16a34a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #fafafa; color: var(--dark); line-height: 1.5; }
  a { color: inherit; }

  /* Navbar */
  .navbar { background: var(--blue); padding: 0.75rem 1.5rem; border-bottom: 4px solid var(--orange); }
  .navbar-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
  .navbar-logo img { height: 52px; display: block; }
  .navbar-links { display: flex; gap: 0.5rem; align-items: center; }
  .navbar-links a {
    color: white; text-decoration: none; font-family: 'Bebas Neue', sans-serif;
    font-size: 1.35rem; letter-spacing: 0.05em; padding: 0.4rem 1rem; border-radius: 6px;
    transition: background 0.15s;
  }
  .navbar-links a:hover { background: rgba(255,255,255,0.12); }
  .navbar-links a.active { background: var(--orange); }
  /* v29 Tweak 3: nav layout — logo + social on left, nav-links on right */
  .navbar-inner { justify-content: flex-start; }
  .navbar-brand { display: flex; align-items: center; gap: 0.6rem; margin-right: 0.6rem; }
  .navbar-brand .nb-logo { height: 44px; width: auto; display: block; }
  /* v34: navbar — logo + social on left, links right, even gaps */
  .navbar-social { display: flex; gap: 0.5rem; align-items: center; margin-left: 0; }
  .navbar-links { margin-left: auto; }
  @media (max-width: 700px) {
    .navbar-brand .nb-logo { height: 36px; }
    .navbar-social { gap: 0.4rem; }
    .navbar-social .nav-soc { width: 30px; height: 30px; }
    .navbar-social .nav-soc svg { width: 16px; height: 16px; }
  }
  @media (max-width: 480px) {
    .navbar-inner { gap: 0.5rem; }
    .navbar-brand .nb-logo { height: 32px; }
    .navbar-links { width: 100%; justify-content: center; order: 99; }
    .navbar-links a { font-size: 1rem; padding: 0.3rem 0.55rem; }
  }

  /* v34: keep social cluster adjacent to logo (was forcing it to the right edge) */
  .navbar-social { display: flex; gap: 0.5rem; align-items: center; margin-left: 0; }
  .navbar-social .nav-soc { width: 36px; height: 36px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; color: white; text-decoration: none; transition: color 0.15s ease, background 0.15s ease; }
  .navbar-social .nav-soc:hover { color: var(--orange); background: rgba(255,255,255,0.08); }
  .navbar-social .nav-soc svg { width: 20px; height: 20px; }
  @media (max-width: 640px) {
    .navbar-social { gap: 0.35rem; }
    .navbar-social .nav-soc { width: 32px; height: 32px; }
  }


  main { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }

  footer { background: var(--dark); color: #9ca3af; padding: 2rem 1.5rem; margin-top: 4rem; text-align: center; font-size: 0.85rem; }
  footer a { color: var(--orange); text-decoration: none; }
  .footer-inner { max-width: 1200px; margin: 0 auto; }
  .footer-social { display: flex; justify-content: center; gap: 0.85rem; margin-bottom: 1.1rem; }
  .footer-social .fs-icon {
    width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.08); color: #cbd5e1;
    transition: background 0.15s ease, color 0.15s ease, transform 0.15s ease;
  }
  .footer-social .fs-icon:hover { background: var(--orange); color: #fff; transform: translateY(-2px); }
  .footer-credit { font-size: 0.9rem; color: #9ca3af; }
  .footer-credit a { font-weight: 700; }
  .footer-credit a:hover { text-decoration: underline; }
  .footer-copy { margin-top: 0.4rem; font-size: 0.8rem; color: #6b7280; }

  @media (max-width: 640px) {
    .navbar-inner { flex-direction: column; }
    .navbar-links a { font-size: 1.1rem; padding: 0.35rem 0.7rem; }
  }
</style>
<style>
  .page-head { padding: 2rem 0 1rem; }
  .page-head h1 { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; color: var(--dark); line-height: 1; }

  .controls-row { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; margin: 1.5rem 0; }
  .view-toggle { display: flex; gap: 0; border-radius: 8px; overflow: hidden; border: 2px solid var(--border); }
  .view-toggle button { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 0.03em; padding: 0.5rem 1.25rem; border: none; background: white; cursor: pointer; color: var(--dark); }
  .view-toggle button.active { background: var(--dark); color: white; }
  .team-search { flex: 1; min-width: 220px; padding: 0.6rem 1rem; border: 2px solid var(--border); border-radius: 8px; font-size: 0.95rem; font-family: inherit; }
  .team-search:focus { outline: none; border-color: var(--orange); }
  .letter-nav { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-bottom: 1.5rem; align-items: center; }
  .letter-nav .ln-label { font-size: 0.8rem; font-weight: 600; color: var(--gray); text-transform: uppercase; margin-right: 0.5rem; }
  .letter-nav a { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; color: var(--blue); text-decoration: none; padding: 0.15rem 0.5rem; border-radius: 4px; }
  .letter-nav a:hover { background: var(--light); }
  .group-header { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; color: var(--gray); border-bottom: 2px solid var(--border); margin: 2rem 0 1rem; padding-bottom: 0.25rem; }
  .group-header.conf-header { display: flex; align-items: center; gap: 0.75rem; }
  .group-header.conf-header img { height: 38px; width: auto; object-fit: contain; flex-shrink: 0; }
  .group-header.conf-header .conf-count { font-size: 1.25rem; color: var(--border); margin-left: 0.25rem; }
  @media (max-width: 480px) {
    .group-header.conf-header img { height: 30px; }
  }
  .team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 0.5rem 1.5rem; }
  .team-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 0.5rem; border-radius: 8px; text-decoration: none; color: inherit; transition: background 0.12s; }
  .team-item:hover { background: var(--light); }
  .team-item img { width: 38px; height: 38px; flex-shrink: 0; }
  .team-item .ti-name { font-weight: 600; font-size: 0.95rem; color: var(--blue); line-height: 1.15; }
  .team-item .ti-sub { font-size: 0.78rem; color: var(--gray); }
  .no-results { text-align: center; padding: 3rem; color: var(--gray); }
  .loading { text-align: center; padding: 3rem; color: var(--gray); font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; }
  .spinner { display: inline-block; width: 40px; height: 40px; border: 4px solid var(--light); border-top-color: var(--orange); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 1rem; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 640px) {
    .page-head h1 { font-size: 2.25rem; }
    .team-grid { grid-template-columns: 1fr 1fr; }
  }
</style>

  const CONF_LOGOS = {
    'ACC':            'https://a.espncdn.com/i/teamlogos/ncaa_conf/500/acc.png',
    'American':       'https://a.espncdn.com/i/teamlogos/ncaa_conf/500/american.png',

  };
  const LOGO_URL = id => `https://a.espncdn.com/i/teamlogos/ncaa/500/${id}.png`;

  let TEAMS = [];
  let FBS_NAMES = new Set();
  let view = 'az';
  let searchTerm = '';

  function fpsKey(s) {
    return (s || '').normalize('NFKD').replace(/[̀-ͯ]/g, '').trim().toLowerCase();
  }

  Promise.all([
    fetch('front_porch_games.json').then(r => r.json()),
    fetch('fbs_teams.json').then(r => r.ok ? r.json() : { teams: [] }).catch(() => ({ teams: [] }))
  ])
  .then(([data, fbsData]) => {
    FBS_NAMES = new Set((fbsData.teams || []).map(t => fpsKey(t.name)));
    const allTeams = [...new Set(data.flatMap(g => [g.team_a, g.team_b]))];
    // Filter to FBS-only when the FBS list loaded successfully; otherwise
    // fall back to the unfiltered list so the page never goes empty.
    TEAMS = (FBS_NAMES.size > 0 ? allTeams.filter(t => FBS_NAMES.has(fpsKey(t))) : allTeams).sort();
    render();
  })
  .catch(err => {
    document.getElementById('content').innerHTML = `<div class="no-results">Failed to load: ${err.message}</div>`;
  });

  function teamItem(t) {
    const meta = TEAM_META[t];
    const conf = TEAM_CONF[t] || '';
    return `<a class="team-item" href="team.html?team=${encodeURIComponent(t)}">
      ${meta ? `<img src="${LOGO_URL(meta.id)}" alt="" onerror="this.style.display='none'">` : ''}
      <div><div class="ti-name">${t}</div><div class="ti-sub">${conf}</div></div>
    </a>`;
  }

  function render() {
    const filtered = TEAMS.filter(t => t.toLowerCase().includes(searchTerm.toLowerCase()));
    const box = document.getElementById('content');
    if (filtered.length === 0) {
      box.innerHTML = '<div class="no-results">No teams match your search.</div>';
      return;
    }
    if (view === 'az') {
      // Group by first letter
      const groups = {};
      filtered.forEach(t => {
        const L = t[0].toUpperCase();
        (groups[L] = groups[L] || []).push(t);
      });
      const letters = Object.keys(groups).sort();
      const letterNav = `<div class="letter-nav"><span class="ln-label">Jump to</span>${
        letters.map(L => `<a href="#letter-${L}">${L}</a>`).join('')}</div>`;
      const sections = letters.map(L => `
        <div class="group-header" id="letter-${L}">${L}</div>
        <div class="team-grid">${groups[L].map(teamItem).join('')}</div>
      `).join('');
      box.innerHTML = letterNav + sections;
    } else {
      // Group by conference
      const groups = {};
      filtered.forEach(t => {
        const c = TEAM_CONF[t] || 'Other';
        (groups[c] = groups[c] || []).push(t);
      });
      const ordered = CONF_ORDER.filter(c => groups[c]);
      Object.keys(groups).forEach(c => { if (!ordered.includes(c)) ordered.push(c); });
      box.innerHTML = ordered.map(c => `
        <div class="group-header conf-header">${CONF_LOGOS[c] ? `<img src="${CONF_LOGOS[c]}" alt="${c}" onerror="this.style.display='none'">` : ''}<span class="conf-name">${c}</span> <span class="conf-count">${groups[c].length}</span></div>
        <div class="team-grid">${groups[c].sort().map(teamItem).join('')}</div>
      `).join('');
    }
  }

  document.getElementById('view-az').onclick = () => {
    view = 'az';
    document.getElementById('view-az').classList.add('active');
    document.getElementById('view-conf').classList.remove('active');
    render();
  };
  document.getElementById('view-conf').onclick = () => {
    view = 'conf';
    document.getElementById('view-conf').classList.add('active');
    document.getElementById('view-az').classList.remove('active');
    render();
  };

    searchTerm = e.target.value;
    render();
