<!DOCTYPE html>

<style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>

  /* Single-bar dual-range slider */
  .range-wrap { position: relative; height: 44px; margin: 0.5rem 0 1rem; }

  .range-fill { position: absolute; top: 50%; transform: translateY(-50%); height: 6px; background: var(--border); border-radius: 3px; }
  .range-wrap input[type="range"] {

  // ===== Tweak 1: drive the large logo/name display above the dropdowns =====
  function updateExpandedTeamDisplay(ddId, team) {
    const slot = ddId === 'dd1' ? 'sel-team1' : 'sel-team2';
    const card = document.getElementById(`${slot}-card`);
    const logo = document.getElementById(`${slot}-logo`);
    const name = document.getElementById(`${slot}-name`);
    const placeholder = document.getElementById(`${slot}-placeholder`);
    if (!card) return;
    if (!team) {
      card.classList.add('empty');
      if (placeholder) placeholder.style.display = '';
      logo.style.display = 'none';
      logo.removeAttribute('src');
      name.textContent = '';
      name.style.color = '';
      return;
    }
    const meta = TEAM_META[team];
    card.classList.remove('empty');
    if (placeholder) placeholder.style.display = 'none';
    if (meta) {
      logo.src = LOGO_URL(meta.id);
      logo.style.display = '';
      logo.onerror = () => { logo.style.display = 'none'; };
      name.style.color = meta.color || '';
    } else {
      logo.style.display = 'none';
      name.style.color = '';
    }
    name.textContent = team;
  }

      counts[g.winner] = (counts[g.winner] || 0) + 1;
    });
    const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
    const rank = {};
    sorted.forEach(([team, w], i) => { rank[team] = { value: w, rank: i + 1 }; });

  // Find opponents a team has the most even all-time series against
  function closestSeries(team, exclude, minGames) {
    const recs = {};
    GAMES.forEach(g => {
      if (g.team_a!==team && g.team_b!==team) return;
      const opp = g.team_a===team ? g.team_b : g.team_a;
      if (opp===exclude || opp===team) return;
      const r = recs[opp] = recs[opp]||{w:0,l:0,t:0};
      if (g.is_tie) r.t++;
      else if (g.winner===team) r.w++;
      else r.l++;
    });
    return Object.entries(recs)
      .map(([opp,r]) => ({ opp, r, games:r.w+r.l+r.t, diff:Math.abs(r.w-r.l) }))
      .filter(x => x.games >= minGames)
      .sort((a,b) => a.diff - b.diff || b.games - a.games);
  }

  // Build up to 4 suggested matchups based on the two compared teams' closest series
  function getSuggestedMatchups() {
    if (!state.team1 || !state.team2) return [];
    const pool = [];
    [[state.team1, state.team2], [state.team2, state.team1]].forEach(([team, other]) => {
      closestSeries(team, other, 4).slice(0, 6).forEach(x => {
        pool.push({ base: team, opp: x.opp, r: x.r, games: x.games, diff: x.diff });
      });
    });
    // sort by closeness, dedup matchups (unordered pair)
    pool.sort((a,b) => a.diff - b.diff || b.games - a.games);
    const seen = new Set();
    const out = [];
    for (const m of pool) {
      const key = [m.base, m.opp].sort().join('|');
      if (seen.has(key)) continue;
      seen.add(key);
      out.push(m);
      if (out.length === 4) break;
    }
    return out;
  }

  // Count a number up/down to its target over ~0.6s
  function animateNumber(el, target) {
    if (!el) return;
    const start = parseInt(el.textContent.replace(/[^0-9-]/g,'')) || 0;
    if (start === target) { el.textContent = target; return; }
    const dur = 600, t0 = performance.now();
    function step(now) {
      const p = Math.min((now - t0) / dur, 1);
      // easeOutCubic
      const eased = 1 - Math.pow(1 - p, 3);
      el.textContent = Math.round(start + (target - start) * eased);
      if (p < 1) requestAnimationFrame(step);
      else el.textContent = target;
    }
    requestAnimationFrame(step);
  }

        <div class="record-line">${leader?`<span class="leader" style="color:${leaderColor}">${recordStr}</span>`:recordStr}</div>
      </div>
      ${(() => {
        const riv = getRivalry();
        if (!riv) return '';
        const hasLogo = !!riv.logo;
        return `<div class="rivalry-badge">
          ${hasLogo ? `<img class="rb-logo" src="${riv.logo}" alt="${riv.name}"
            onerror="this.style.display='none';var p=this.parentElement.querySelector('.rb-pill');if(p)p.classList.remove('rb-hidden');">` : ''}
          <span class="rb-pill${hasLogo ? ' rb-hidden' : ''}"><span class="rb-star">&#9733;</span>${riv.name}<span class="rb-star">&#9733;</span></span>
          ${riv.trophy ? `<span class="rb-trophy">Trophy: ${riv.trophy}</span>` : ''}
        </div>`;
      })()}
      <div class="h2h-bar-container">
        <div class="h2h-teams-row">
          <div class="team-label">${teamLogo(state.team1,true)}<div class="team-info"><span class="team-name-row">${state.team1}</span><span class="wins-count"><span class="win-num">${t1Wins}</span><span class="win-word">wins</span></span></div></div>
          <div class="team-label right">${teamLogo(state.team2,true)}<div class="team-info"><span class="team-name-row">${state.team2}</span><span class="wins-count"><span class="win-num">${t2Wins}</span><span class="win-word">wins</span></span></div></div>
        </div>
        <div class="h2h-bar">
          ${t1Pct>0?`<div class="h2h-bar-segment t1" data-target-width="${t1Pct}" style="background:${t1Color};width:0%">${t1Pct>=8?t1Wins:''}</div>`:''}
          ${tiePct>0?`<div class="h2h-bar-segment ties" data-target-left="${t1Pct}" data-target-width="${tiePct}" title="${ties} tie${ties===1?'':'s'}" style="left:${(t1Pct + tiePct/2).toFixed(2)}%;width:0%">${tiePct>=6?ties+(ties===1?' TIE':' TIES'):tiePct>=3?ties:''}</div>`:''}
          ${t2Pct>0?`<div class="h2h-bar-segment t2" data-target-width="${t2Pct}" style="background:${t2Color};width:0%">${t2Pct>=8?t2Wins:''}</div>`:''}
        </div>
      </div>
      <!-- Tweak 2 (v26): Full Games List sits directly below the H2H bar -->
      <div class="games-toggle">
        <a class="btn btn-secondary" id="games-link" href="#">Full Games List &rarr;</a>
      </div>
    `;

    // ===== BOTTOM container: charts, stat grid, program comparison, games link, suggested matchups =====
    resEl.innerHTML = `
      <div class="chart-box">
        <div class="chart-title">Head-to-Head Results</div>
        <canvas id="marginChart" height="110"></canvas>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-team">${teamLogo(state.team1)}${state.team1}</div>
          <div class="stat-value" style="color:${t1Color}">${t1Margin.margin}</div>
          <div class="stat-label">Largest Margin</div>
          <div class="stat-detail">${t1Margin.score} (${t1Margin.season||'-'})</div>
        </div>
        <div class="stat-card">
          <div class="stat-team">${teamLogo(state.team1)}${state.team1}</div>
          <div class="stat-value" style="color:${t1Color}">${t1Streak.length}</div>
          <div class="stat-label">Longest Win Streak</div>
          <div class="stat-detail">${t1Streak.length?t1Streak.start+'-'+t1Streak.end:'-'}</div>
        </div>
        <div class="stat-card">
          <div class="stat-team">${teamLogo(state.team2)}${state.team2}</div>
          <div class="stat-value" style="color:${t2Color}">${t2Margin.margin}</div>
          <div class="stat-label">Largest Margin</div>
          <div class="stat-detail">${t2Margin.score} (${t2Margin.season||'-'})</div>
        </div>
        <div class="stat-card">
          <div class="stat-team">${teamLogo(state.team2)}${state.team2}</div>
          <div class="stat-value" style="color:${t2Color}">${t2Streak.length}</div>
          <div class="stat-label">Longest Win Streak</div>
          <div class="stat-detail">${t2Streak.length?t2Streak.start+'-'+t2Streak.end:'-'}</div>
        </div>
      </div>

      <div class="chart-box">
        <div class="chart-title">Record (Winning %)</div>
        <div class="chart-canvas-wrap"><canvas id="winPctChart"></canvas></div>
      </div>

      ${renderStatComparison(t1Color, t2Color)}

      ${(() => {
        const sugg = getSuggestedMatchups();
        if (!sugg.length) return '';
        return `<div class="suggested-section">
          <div class="chart-title">Suggested Matchups</div>
          <p class="suggested-sub">Tight series involving ${state.team1} or ${state.team2}</p>
          <div class="suggested-grid">
            ${sugg.map(m => {
              const bColor = TEAM_META[m.base]?.color || '#fe5c00';
              const oColor = TEAM_META[m.opp]?.color || '#003594';
              const recStr = `${m.r.w}-${m.r.l}${m.r.t?'-'+m.r.t:''}`;
              const url = `compare.html?team1=${encodeURIComponent(m.base)}&team2=${encodeURIComponent(m.opp)}`;
              const bWins = m.r.w, oWins = m.r.l, ties = m.r.t;
              const winsTotal = bWins + oWins || 1;
              const bPct = (bWins / winsTotal) * 100;
              const oPct = (oWins / winsTotal) * 100;
              const leadStr = bWins > oWins ? `${m.base} leads ${recStr}`
                            : oWins > bWins ? `${m.opp} leads ${oWins}-${bWins}${ties?'-'+ties:''}`
                            : `Series tied ${recStr}`;
              return `<a class="suggested-card" href="${url}">
                <div class="sc-teams">
                  <span class="sc-team">${teamLogo(m.base)}<span class="sc-name">${m.base}</span></span>
                  <span class="sc-wins" style="color:${bColor}">${bWins}</span>
                  <span class="sc-wins" style="color:${oColor}">${oWins}</span>
                  <span class="sc-team right">${teamLogo(m.opp)}<span class="sc-name">${m.opp}</span></span>
                </div>
                <div class="sc-bar">
                  ${bPct>0?`<div class="sc-bar-seg" style="background:${bColor};width:${bPct}%"></div>`:''}
                  ${oPct>0?`<div class="sc-bar-seg" style="background:${oColor};width:${oPct}%"></div>`:''}
                </div>
                <div class="sc-record">${leadStr}<span class="sc-sub">${m.games} all-time meetings${ties?' &middot; '+ties+' tie'+(ties>1?'s':''):''}</span></div>
              </a>`;
            }).join('')}
          </div>
        </div>`;
      })()}
    `;

    // --- Animations ---
    animateNumber(document.getElementById('total-num'), total);
    // Tweak 2: bar segments always start at width 0 and animate to target — t1 grows from the left edge,
    // t2 grows from the right edge, the tie segment grows outward from the split point. Width:0% is set
    // in the initial markup; here we set the targets in the next frame so the CSS transition fires.
    requestAnimationFrame(() => {
      document.querySelectorAll('.h2h-bar-segment').forEach(seg => {
        const tgtW = parseFloat(seg.dataset.targetWidth);
        const tgtL = parseFloat(seg.dataset.targetLeft);
        if (!isNaN(tgtW)) seg.style.width = tgtW + '%';
        if (!isNaN(tgtL)) seg.style.left = tgtL + '%';
      });
    });

    // Full Games List opens its own page (mobile-friendly)
    const gl = document.getElementById('games-link');
    if (gl) {
      gl.href = `games.html?team1=${encodeURIComponent(state.team1)}&team2=${encodeURIComponent(state.team2)}`
              + `&start=${state.startYear}&end=${state.endYear}`;
    }

    drawCharts(games);
  }

  // ===== Tweak 4 (v26): Winsipedia split-color stat cards with rank ordinal + denominator =====
  function renderStatComparison(t1Color, t2Color) {
    const t1 = state.team1, t2 = state.team2;
    const s1 = TEAM_STATS[t1] || {};
    const s2 = TEAM_STATS[t2] || {};

    const wr = buildWinsRank();
    const pr = buildWinPctRank();
    const w1 = wr.rank[t1], w2 = wr.rank[t2];
    const p1 = pr.rank[t1], p2 = pr.rank[t2];

    const fmtPct = v => (v == null ? '—' : (v * 100).toFixed(1) + '%');
    // value cell: returns either a big number or a faded em-dash placeholder
    const valHtml = v => (v == null ? '<div class="scc-na">—</div>' : `<div class="scc-value">${v}</div>`);
    const rankHtml = (r, total) => {
      if (r == null) return '';
      return `<div class="scc-rank-ord">${ordinal(r)}</div><div class="scc-rank-of">of ${total}</div>`;
    };

    const rows = [
      { title: 'All-Time Win %',
        v1: p1 ? fmtPct(p1.value) : null, r1: p1 ? p1.rank : null, t1Total: pr.total,
        v2: p2 ? fmtPct(p2.value) : null, r2: p2 ? p2.rank : null, t2Total: pr.total },
      { title: 'Total Wins',
        v1: w1 ? w1.value : null, r1: w1 ? w1.rank : null, t1Total: wr.total,
        v2: w2 ? w2.value : null, r2: w2 ? w2.rank : null, t2Total: wr.total },
      { title: 'National Championships (Claimed)',
        v1: s1.ncClaimed,    r1: s1.ncClaimedRank,    t1Total: TOTAL_FBS,
        v2: s2.ncClaimed,    r2: s2.ncClaimedRank,    t2Total: TOTAL_FBS },
      { title: 'National Championships (Recognized)',
        v1: s1.ncRecognized, r1: s1.ncRecognizedRank, t1Total: TOTAL_FBS,
        v2: s2.ncRecognized, r2: s2.ncRecognizedRank, t2Total: TOTAL_FBS },
      { title: 'Conference Championships',
        v1: s1.confChamps,   r1: s1.confChampsRank,   t1Total: TOTAL_FBS,
        v2: s2.confChamps,   r2: s2.confChampsRank,   t2Total: TOTAL_FBS },
      { title: 'Bowl Games',
        v1: s1.bowlGames,    r1: s1.bowlGamesRank,    t1Total: TOTAL_FBS,
        v2: s2.bowlGames,    r2: s2.bowlGamesRank,    t2Total: TOTAL_FBS },
      { title: 'Consensus All-Americans',
        v1: s1.allAmericans, r1: s1.allAmericansRank, t1Total: TOTAL_FBS,
        v2: s2.allAmericans, r2: s2.allAmericansRank, t2Total: TOTAL_FBS },
      { title: 'Heisman Winners',
        v1: s1.heismans,     r1: s1.heismansRank,     t1Total: TOTAL_FBS,
        v2: s2.heismans,     r2: s2.heismansRank,     t2Total: TOTAL_FBS },
      { title: 'NFL Draft Picks',
        v1: s1.nflPicks,     r1: s1.nflPicksRank,     t1Total: TOTAL_FBS,
        v2: s2.nflPicks,     r2: s2.nflPicksRank,     t2Total: TOTAL_FBS },
      { title: 'First Round Draft Picks',
        v1: s1.firstRound,   r1: s1.firstRoundRank,   t1Total: TOTAL_FBS,
        v2: s2.firstRound,   r2: s2.firstRoundRank,   t2Total: TOTAL_FBS },
      { title: 'Weeks in AP Poll',
        v1: s1.weeksInAP,    r1: s1.weeksInAPRank,    t1Total: TOTAL_FBS,
        v2: s2.weeksInAP,    r2: s2.weeksInAPRank,    t2Total: TOTAL_FBS },
      { title: 'Weeks at #1',
        v1: s1.weeksAtNo1,   r1: s1.weeksAtNo1Rank,   t1Total: TOTAL_FBS,
        v2: s2.weeksAtNo1,   r2: s2.weeksAtNo1Rank,   t2Total: TOTAL_FBS }
    ];

    return `<div class="stat-comparison-section">
      <div class="chart-title">Program Comparison</div>
      <p class="stat-comparison-sub">All-time program totals with national rank</p>
      <div class="stat-comparison-grid">
        ${rows.map(s => `<div class="stat-card-compare">
          <div class="scc-title">${s.title}</div>
          <div class="scc-body">
            <div class="scc-side left" style="background:${t1Color}">
              ${valHtml(s.v1)}
              ${rankHtml(s.r1, s.t1Total)}
            </div>
            <div class="scc-side" style="background:${t2Color}">
              ${valHtml(s.v2)}
              ${rankHtml(s.r2, s.t2Total)}
            </div>
          </div>
        </div>`).join('')}
      </div>
    </div>`;
  }

  function drawCharts(games) {
    if (charts.margin) charts.margin.destroy();
    if (charts.lead) charts.lead.destroy();
    const sorted = [...games].sort((a,b)=>a.game_date.localeCompare(b.game_date));
    const t1Color = TEAM_META[state.team1]?.color || '#fe5c00';
    const t2Color = TEAM_META[state.team2]?.color || '#003594';
    const t1Abbr = TEAM_META[state.team1]?.abbr || state.team1;
    const t2Abbr = TEAM_META[state.team2]?.abbr || state.team2;
    const labels = sorted.map(g => g.season);

    const marginData = sorted.map(g => {
      if (g.is_tie) return 0;
      return g.winner === state.team1 ? Math.abs(g.margin) : -Math.abs(g.margin);
    });
    charts.margin = new Chart(document.getElementById('marginChart'), {
      type: 'bar',
      data: { labels, datasets: [{ data: marginData, backgroundColor: marginData.map(v => v>=0?t1Color:t2Color), borderWidth: 0 }] },
      options: {
        responsive: true, maintainAspectRatio: true,
        plugins: { legend:{display:false}, tooltip:{callbacks:{label:ctx=>{
          const v=ctx.raw; if(v===0)return'Tie'; return `${v>0?state.team1:state.team2} by ${Math.abs(v)}`;
        }}}},
        scales: { x:{ticks:{maxTicksLimit:12},grid:{display:false}}, y:{title:{display:true,text:`\u2190 ${t2Abbr}    |    ${t1Abbr} \u2192`}} }
      }
    });

    // Dual win-% line chart: each team's season-by-season winning % across ALL their games
    drawWinPctChart(t1Color, t2Color);
  }

  // Build per-season win% for a team from the full dataset (all opponents)
  function seasonWinPct(team) {
    const bySeason = {};
    GAMES.forEach(g => {
      if (g.team_a !== team && g.team_b !== team) return;
      const s = g.season;
      const r = bySeason[s] = bySeason[s] || {w:0,l:0,t:0};
      if (g.is_tie) r.t++;
      else if (g.winner === team) r.w++;
      else r.l++;
    });
    return bySeason;
  }

  function drawWinPctChart(t1Color, t2Color) {
    if (charts.winpct) charts.winpct.destroy();
    const s1 = seasonWinPct(state.team1);
    const s2 = seasonWinPct(state.team2);
    // shared season axis, clamped to the active year range
    const allSeasons = [...new Set([...Object.keys(s1), ...Object.keys(s2)].map(Number))]
      .filter(y => y >= state.startYear && y <= state.endYear)
      .sort((a,b)=>a-b);

    const recordOf = (bySeason, yr) => {
      const r = bySeason[yr];
      if (!r) return null;
      const tot = r.w+r.l+r.t;
      return { pct: tot ? (r.w + r.t*0.5)/tot : null, rec: `${r.w}-${r.l}${r.t?'-'+r.t:''}` };
    };
    const d1 = allSeasons.map(yr => { const x = recordOf(s1,yr); return x?x.pct:null; });
    const d2 = allSeasons.map(yr => { const x = recordOf(s2,yr); return x?x.pct:null; });
    const rec1 = allSeasons.map(yr => { const x = recordOf(s1,yr); return x?x.rec:''; });
    const rec2 = allSeasons.map(yr => { const x = recordOf(s2,yr); return x?x.rec:''; });

    charts.winpct = new Chart(document.getElementById('winPctChart'), {
      type: 'line',
      data: { labels: allSeasons, datasets: [
        { label: state.team1, data: d1, borderColor: t1Color, backgroundColor: 'transparent',
          fill: false, tension: 0.35, pointRadius: 0, pointHoverRadius: 5,
          pointHoverBackgroundColor: t1Color, pointHoverBorderColor: '#fff', pointHoverBorderWidth: 2,
          borderWidth: 2.5, spanGaps: true, _recs: rec1 },
        { label: state.team2, data: d2, borderColor: t2Color, backgroundColor: 'transparent',
          fill: false, tension: 0.35, pointRadius: 0, pointHoverRadius: 5,
          pointHoverBackgroundColor: t2Color, pointHoverBorderColor: '#fff', pointHoverBorderWidth: 2,
          borderWidth: 2.5, spanGaps: true, _recs: rec2 }
      ]},
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: true, position: 'bottom',
            labels: { usePointStyle: true, pointStyle: 'line', boxWidth: 28, padding: 18,
              font: { size: 13, weight: '600' } } },
          tooltip: {
            mode: 'index', intersect: false,
            backgroundColor: 'rgba(13,17,23,0.92)', padding: 10, cornerRadius: 6,
            titleFont: { size: 13, weight: '700' }, bodyFont: { size: 12 },
            callbacks: {
              title: items => items.length ? `Season ${items[0].label}` : '',
              label: ctx => {
                const rec = ctx.dataset._recs[ctx.dataIndex] || 'did not play';
                const pct = ctx.raw==null ? '' : '  (.'+(ctx.raw*1000).toFixed(0)+')';
                return `  ${ctx.dataset.label}: ${rec}${pct}`;
              }
            }
          }
        },
        scales: {
          x: {
            ticks: { maxTicksLimit: 10, maxRotation: 0, autoSkip: true,
              font: { size: 11 }, color: '#6b7280' },
            grid: { display: false },
            border: { color: '#e5e7eb' }
          },
          y: {
            min: 0, max: 1,
            ticks: { stepSize: 0.25, callback: v => (v*100)+'%',
              font: { size: 11 }, color: '#6b7280' },
            grid: { color: '#f0f0f0' },
            border: { display: false }
          }
        }
      }
    });
  }


</script>
</body>
</html>
