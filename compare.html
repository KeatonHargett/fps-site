<style>

  /* Single-bar dual-range slider */
  .range-wrap { position: relative; height: 44px; margin: 0.5rem 0 1rem; }
  .range-track { position: absolute; top: 50%; transform: translateY(-50%); left: 0; right: 0; height: 6px; background: var(--light); border-radius: 3px; }

  }

  .range-wrap input[type="range"]::-webkit-slider-thumb {

  .preset-select { flex: 1; min-width: 240px; padding: 0.7rem 2.5rem 0.7rem 0.85rem; border: 2px solid var(--border); border-radius: 8px; background: white; font-size: 1rem; font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.04em; color: var(--dark); cursor: pointer; appearance: none; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 20 20' fill='none'><path stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='m6 8 4 4 4-4'/></svg>"); background-repeat: no-repeat; background-position: right 0.75rem center; background-size: 18px; }

  // ===== Tweak 1: drive the large logo/name display above the dropdowns =====
  function updateExpandedTeamDisplay(ddId, team) {
    const slot = ddId === 'dd1' ? 'sel-team1' : 'sel-team2';
    const card = document.getElementById(`${slot}-card`);
    const logo = document.getElementById(`${slot}-logo`);
    const name = document.getElementById(`${slot}-name`);
    const placeholder = document.getElementById(`${slot}-placeholder`);
    // v29 fix: do NOT early-return when card is missing; we removed sel-team-card markup in v29
    // v29: update the new selector-bar text (SCHOOL + mascot)
    const sbSchool = document.getElementById(`${ddId}-school`);
    const sbMascot = document.getElementById(`${ddId}-mascot`);
    if (!team) {
      if (card) { card.classList.add('empty'); }
      if (placeholder) placeholder.style.display = '';
      if (logo) { logo.style.display = 'none'; logo.removeAttribute('src'); }
      if (name) { name.textContent = ''; name.style.color = ''; }
      if (sbSchool) { sbSchool.textContent = 'Pick a team'; sbSchool.style.color = ''; }
      if (sbMascot) { sbMascot.textContent = ''; }
      return;
    }
    const meta = TEAM_META[team];
    const disp = TEAM_DISPLAY[team] || { school: team.toUpperCase(), mascot: '' };
    if (card) card.classList.remove('empty');
    if (placeholder) placeholder.style.display = 'none';
    if (logo) {
      if (meta) {
        logo.src = LOGO_URL(meta.id);
        logo.style.display = '';
        logo.onerror = () => { logo.style.display = 'none'; };
      } else { logo.style.display = 'none'; }
    }
    if (name) {
      name.style.color = meta ? (meta.color || '') : '';
      name.textContent = team;
    }
    if (sbSchool) {
      sbSchool.textContent = disp.school;
      sbSchool.style.color = meta ? (meta.color || '') : '';
    }
    if (sbMascot) { sbMascot.textContent = disp.mascot; }
  }

      counts[g.winner] = (counts[g.winner] || 0) + 1;
    });
    const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
    const rank = {};
    sorted.forEach(([team, w], i) => { rank[team] = { value: w, rank: i + 1 }; });

        if (!recs[t]) recs[t] = { w: 0, l: 0, t: 0 };

      if (g.is_tie) { recs[g.team_a].t++; recs[g.team_b].t++; }

    // require at least 50 games to qualify, matching standard all-time tables

      .map(([team, r]) => ({ team, g: r.w + r.l + r.t, pct: (r.w + 0.5 * r.t) / Math.max(1, r.w + r.l + r.t) }))

      updateExpandedTeamDisplay(ddId, team);

    function openPanel() {
      panel.classList.add('open');
      toggle.classList.add('open');
      search.value = '';
      renderOptions();
      search.focus();
      highlighted = -1;

      panel.classList.remove('open');
      toggle.classList.remove('open');

      if (panel.classList.contains('open')) closePanel();

      const opts = [...optsBox.querySelectorAll('.dd-option')];
      if (e.key === 'ArrowDown') { e.preventDefault(); highlighted = Math.min(highlighted+1, opts.length-1); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); highlighted = Math.max(highlighted-1, 0); }
      else if (e.key === 'Enter') { e.preventDefault(); if (opts[highlighted]) selectTeam(opts[highlighted].dataset.team); return; }
      else if (e.key === 'Escape') { closePanel(); return; }

      opts.forEach((o,i) => o.classList.toggle('highlighted', i === highlighted));

  // Compute longest win streak for a team within a game set
  function longestStreak(games, team) {
    const sorted = [...games].sort((a,b)=>a.game_date.localeCompare(b.game_date));
    let best = 0, cur = 0, bestStart = null, bestEnd = null, curStart = null;
    for (const g of sorted) {
      if (g.winner === team) {
        if (cur === 0) curStart = g.season;
        cur++;
        if (cur > best) { best = cur; bestStart = curStart; bestEnd = g.season; }
      } else {
        cur = 0;
      }
    }
    return { length: best, start: bestStart, end: bestEnd };

  // Largest margin of victory for a team
  function largestMargin(games, team) {
    let best = { margin: 0, season: null, score: '' };
    for (const g of games) {
      if (g.winner !== team) continue;
      const m = Math.abs(g.margin);
      if (m > best.margin) {
        const wScore = Math.max(g.team_a_score, g.team_b_score);
        const lScore = Math.min(g.team_a_score, g.team_b_score);
        best = { margin: m, season: g.season, score: `${wScore}-${lScore}` };
      }
    }
    return best;
  }

  // Find opponents a team has the most even all-time series against
  function closestSeries(team, exclude, minGames) {
    const recs = {};
    GAMES.forEach(g => {
      if (g.team_a!==team && g.team_b!==team) return;
      const opp = g.team_a===team ? g.team_b : g.team_a;
      if (opp===exclude || opp===team) return;
      const r = recs[opp] = recs[opp]||{w:0,l:0,t:0};
      if (g.is_tie) r.t++;
      else if (g.winner===team) r.w++;
      else r.l++;
    });
    return Object.entries(recs)
      .map(([opp,r]) => ({ opp, r, games:r.w+r.l+r.t, diff:Math.abs(r.w-r.l) }))
      .filter(x => x.games >= minGames)
      .sort((a,b) => a.diff - b.diff || b.games - a.games);
  }

    });
    // sort by closeness, dedup matchups (unordered pair)
    pool.sort((a,b) => a.diff - b.diff || b.games - a.games);
    const seen = new Set();
    const out = [];
    for (const m of pool) {
      const key = [m.base, m.opp].sort().join('|');
      if (seen.has(key)) continue;
      seen.add(key);
      out.push(m);
      if (out.length === 4) break;
    }
    return out;
  }

  // Count a number up/down to its target over ~0.6s
  function animateNumber(el, target) {
    if (!el) return;
    const start = parseInt(el.textContent.replace(/[^0-9-]/g,'')) || 0;
    if (start === target) { el.textContent = target; return; }
    const dur = 600, t0 = performance.now();
    function step(now) {
      const p = Math.min((now - t0) / dur, 1);
      // easeOutCubic
      const eased = 1 - Math.pow(1 - p, 3);
      el.textContent = Math.round(start + (target - start) * eased);
      if (p < 1) requestAnimationFrame(step);
      else el.textContent = target;
    }
    requestAnimationFrame(step);
  }

  // v29: compute total all-time games played by a team
  let _allTimeGamesCache = null;
  function totalGamesAllTime(team) {
    if (!_allTimeGamesCache) {
      _allTimeGamesCache = {};
      for (const g of GAMES) {
        _allTimeGamesCache[g.team_a] = (_allTimeGamesCache[g.team_a] || 0) + 1;
        _allTimeGamesCache[g.team_b] = (_allTimeGamesCache[g.team_b] || 0) + 1;
      }
    }
    return _allTimeGamesCache[team] || 0;
  }

  // v29: current H2H win streak between the two selected teams (from full data)
  function currentH2HStreak() {
    if (!state.team1 || !state.team2) return null;
    const all = GAMES.filter(g =>
      (g.team_a === state.team1 && g.team_b === state.team2) ||
      (g.team_a === state.team2 && g.team_b === state.team1)
    ).sort((a, b) => b.game_date.localeCompare(a.game_date));
    if (all.length === 0) return null;
    if (all[0].is_tie) return { count: 0, team: null, startYear: all[0].season, endYear: all[0].season, tied: true };
    const streakTeam = all[0].winner;
    let count = 0, startYear = null, endYear = null;
    for (const g of all) {
      if (g.winner === streakTeam) {
        count++;
        if (endYear === null) endYear = g.season;
        startYear = g.season;
      } else { break; }
    }
    return { count, team: streakTeam, startYear, endYear, tied: false };
  }

  function render() {
    if (!GAMES.length) return;
    const topEl = document.getElementById('top-results');
    const resEl = document.getElementById('results');

    if (!state.team1 || !state.team2) {
      if (topEl) topEl.innerHTML = '';
      resEl.innerHTML = `<div class="empty-state"><h3>Select two teams to compare</h3><p>Pick a team from each dropdown above to see their head-to-head history.</p></div>`;
      return;
    }
    if (state.team1 === state.team2) {
      if (topEl) topEl.innerHTML = '';
      resEl.innerHTML = `<div class="empty-state"><h3>Pick two different teams</h3></div>`;
      return;
    }
    const games = getRivalryGames();
    if (games.length === 0) {
      if (topEl) topEl.innerHTML = '';
      resEl.innerHTML =
        `<div class="empty-state"><h3>No games found</h3><p>${state.team1} and ${state.team2} haven't played between ${state.startYear} and ${state.endYear}.</p></div>`;
      return;
    }
    const t1Wins = games.filter(g => g.winner===state.team1).length;
    const t2Wins = games.filter(g => g.winner===state.team2).length;
    const ties = games.filter(g => g.is_tie).length;
    const total = games.length;
    const leader = t1Wins>t2Wins ? state.team1 : t2Wins>t1Wins ? state.team2 : null;
    const recordStr = leader
      ? `${leader} leads ${Math.max(t1Wins,t2Wins)}-${Math.min(t1Wins,t2Wins)}${ties?'-'+ties:''}`
      : `Series tied ${t1Wins}-${t2Wins}${ties?'-'+ties:''}`;
    const t1Pct=(t1Wins/total)*100, t2Pct=(t2Wins/total)*100, tiePct=(ties/total)*100;
    const t1Color = TEAM_META[state.team1]?.color || '#fe5c00';
    const t2Color = TEAM_META[state.team2]?.color || '#003594';
    const leaderColor = leader === state.team1 ? t1Color : leader === state.team2 ? t2Color : 'var(--orange)';

    const isLastN = !!state.lastN;
    const isPastPreset = ['past5','past10','past20'].includes(state.activePreset);
    const totalLabel = isLastN
      ? `Last ${state.lastN} Matchups &middot; ${state.startYear}-${state.endYear}`
      : `Total Meetings &middot; ${state.startYear}-${state.endYear}`;

    const t1Margin = largestMargin(games, state.team1);
    const t2Margin = largestMargin(games, state.team2);
    const t1Streak = longestStreak(games, state.team1);
    const t2Streak = longestStreak(games, state.team2);

    // ===== v29 TOP container: hero H2H bar + current streak =====
    const t1Games = totalGamesAllTime(state.team1);
    const t2Games = totalGamesAllTime(state.team2);
    const streak = currentH2HStreak();
    topEl.innerHTML = `
      <div class="h2h-summary">
        ${isPastPreset && !isLastN
          ? ''
          : `<div class="total" id="total-num">${total}</div>
             <div class="total-label">${totalLabel}</div>`}
        <div class="record-line">${leader?`<span class="leader" style="color:${leaderColor}">${recordStr}</span>`:recordStr}</div>
      </div>
      ${(() => {
        const riv = getRivalry();
        if (!riv) return '';
        const hasLogo = !!riv.logo;
        return `<div class="rivalry-badge">
          ${hasLogo ? `<img class="rb-logo" src="${riv.logo}" alt="${riv.name}"
            onerror="this.style.display='none';var p=this.parentElement.querySelector('.rb-pill');if(p)p.classList.remove('rb-hidden');">` : ''}
          <span class="rb-pill${hasLogo ? ' rb-hidden' : ''}"><span class="rb-star">&#9733;</span>${riv.name}<span class="rb-star">&#9733;</span></span>
          ${riv.trophy ? `<span class="rb-trophy">Trophy: ${riv.trophy}</span>` : ''}
        </div>`;
      })()}
      <!-- v29 Tweak 1B: hero bar with logos on opposite ends, big WINS numbers next to logos -->
      <div class="hero-bar">
        <div class="hero-bar-row">
          <div class="hb-end">
            <a class="hb-logo-wrap" href="team.html?team=${encodeURIComponent(state.team1)}" aria-label="${state.team1} profile">
              ${TEAM_META[state.team1] ? `<img src="${LOGO_URL(TEAM_META[state.team1].id)}" alt="${state.team1}" onerror="this.style.display='none'">` : ''}
            </a>
            <div class="hb-wins" style="color:${t1Color}">${t1Wins}</div>
            <div class="hb-wins-label">WINS</div>
            <div class="hb-games">(${t1Games.toLocaleString()} all-time)</div>
          </div>
          <div class="hb-bar-wrap">
            <div class="hb-bar">
              ${t1Pct>0?`<div class="hb-seg t1" data-target-width="${t1Pct}" style="background:${t1Color};width:0%">${t1Pct>=8?t1Wins:''}</div>`:''}
              ${tiePct>0?`<div class="hb-seg ties" data-target-left="${t1Pct}" data-target-width="${tiePct}" title="${ties} tie${ties===1?'':'s'}" style="left:${(t1Pct + tiePct/2).toFixed(2)}%;width:0%">${tiePct>=6?ties+(ties===1?' TIE':' TIES'):tiePct>=3?ties:''}</div>`:''}
              ${t2Pct>0?`<div class="hb-seg t2" data-target-width="${t2Pct}" style="background:${t2Color};width:0%">${t2Pct>=8?t2Wins:''}</div>`:''}
            </div>
            ${ties > 0 ? `<div class="hb-record-line" style="color:var(--gray)">${ties} tie${ties===1?'':'s'}</div>` : ''}
          </div>
          <div class="hb-end">
            <a class="hb-logo-wrap" href="team.html?team=${encodeURIComponent(state.team2)}" aria-label="${state.team2} profile">
              ${TEAM_META[state.team2] ? `<img src="${LOGO_URL(TEAM_META[state.team2].id)}" alt="${state.team2}" onerror="this.style.display='none'">` : ''}
            </a>
            <div class="hb-wins" style="color:${t2Color}">${t2Wins}</div>
            <div class="hb-wins-label">WINS</div>
            <div class="hb-games">(${t2Games.toLocaleString()} all-time)</div>
          </div>
        </div>
      </div>
      ${(() => {
        if (!streak) return '';
        if (streak.tied) {
          return `<div class="streak-block">
            <div class="streak-label">Last Meeting</div>
            <div class="streak-value" style="color:var(--gray)">TIE (${streak.startYear})</div>
          </div>`;
        }
        if (streak.count === 0) return '';
        const sColor = TEAM_META[streak.team]?.color || 'var(--dark)';
        const sDisp = (TEAM_DISPLAY[streak.team] && TEAM_DISPLAY[streak.team].school) || streak.team.toUpperCase();
        const yr = streak.startYear === streak.endYear ? `${streak.startYear}` : `${streak.startYear}-${streak.endYear}`;
        return `<div class="streak-block">
          <div class="streak-label">Current Win Streak</div>
          <div class="streak-value" style="color:${sColor}">${streak.count} &middot; ${sDisp} (${yr})</div>
        </div>`;
      })()}
    `;

    // ===== BOTTOM container: charts, stat grid, program comparison, games link, suggested matchups =====
    resEl.innerHTML = `
      <div class="chart-box">
        <div class="chart-title">Head-to-Head Results</div>
        <canvas id="marginChart" height="110"></canvas>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-team">${teamLogo(state.team1)}${state.team1}</div>
          <div class="stat-value" style="color:${t1Color}">${t1Margin.margin}</div>
          <div class="stat-label">Largest Margin</div>
          <div class="stat-detail">${t1Margin.score} (${t1Margin.season||'-'})</div>
        </div>
        <div class="stat-card">
          <div class="stat-team">${teamLogo(state.team1)}${state.team1}</div>
          <div class="stat-value" style="color:${t1Color}">${t1Streak.length}</div>
          <div class="stat-label">Longest Win Streak</div>
          <div class="stat-detail">${t1Streak.length?t1Streak.start+'-'+t1Streak.end:'-'}</div>
        </div>
        <div class="stat-card">
          <div class="stat-team">${teamLogo(state.team2)}${state.team2}</div>
          <div class="stat-value" style="color:${t2Color}">${t2Margin.margin}</div>
          <div class="stat-label">Largest Margin</div>
          <div class="stat-detail">${t2Margin.score} (${t2Margin.season||'-'})</div>
        </div>
        <div class="stat-card">
          <div class="stat-team">${teamLogo(state.team2)}${state.team2}</div>
          <div class="stat-value" style="color:${t2Color}">${t2Streak.length}</div>
          <div class="stat-label">Longest Win Streak</div>
          <div class="stat-detail">${t2Streak.length?t2Streak.start+'-'+t2Streak.end:'-'}</div>
        </div>
      </div>

      <div class="chart-box">
        <div class="chart-title">Record (Winning %)</div>
        <div class="chart-canvas-wrap"><canvas id="winPctChart"></canvas></div>
      </div>

      ${renderStatComparison(t1Color, t2Color)}
      <!-- v29 Tweak 1G: Suggested Matchups removed -->
    `;

    // --- Animations ---
    animateNumber(document.getElementById('total-num'), total);
    // Tweak 2: bar segments always start at width 0 and animate to target — t1 grows from the left edge,
    // t2 grows from the right edge, the tie segment grows outward from the split point. Width:0% is set
    // in the initial markup; here we set the targets in the next frame so the CSS transition fires.
    requestAnimationFrame(() => {
      document.querySelectorAll('.h2h-bar-segment, .hb-seg').forEach(seg => {
        const tgtW = parseFloat(seg.dataset.targetWidth);
        const tgtL = parseFloat(seg.dataset.targetLeft);
        if (!isNaN(tgtW)) seg.style.width = tgtW + '%';
        if (!isNaN(tgtL)) seg.style.left = tgtL + '%';
      });
    });

    // Full Games List opens its own page (mobile-friendly)
    const gl = document.getElementById('games-link');
    if (gl) {
      gl.href = `games.html?team1=${encodeURIComponent(state.team1)}&team2=${encodeURIComponent(state.team2)}`
              + `&start=${state.startYear}&end=${state.endYear}`;
    }

    drawCharts(games);
  }

  // v30: use PROGRAM_STATS for complete program-level stats; fall back to legacy TEAM_STATS
  function renderStatComparison(t1Color, t2Color) {
    const t1 = state.team1, t2 = state.team2;
    const ps1 = (PROGRAM_STATS && PROGRAM_STATS[t1]) || null;
    const ps2 = (PROGRAM_STATS && PROGRAM_STATS[t2]) || null;
    const s1 = TEAM_STATS[t1] || {};
    const s2 = TEAM_STATS[t2] || {};
    const TOTAL = PROGRAM_STATS ? Object.keys(PROGRAM_STATS).length : TOTAL_FBS;
    const wr = buildWinsRank();
    const pr = buildWinPctRank();

    const fmtPct = v => '.' + Math.round(v * 1000).toString().padStart(3, '0');
    const valHtml = v => (v == null || v === undefined ? '<div class="scc-na">&mdash;</div>' : `<div class="scc-value">${v}</div>`);
    const rankHtml = (r, total) => (r == null || r === 0) ? '' : `<div class="scc-rank-ord">${ordinal(r)}</div><div class="scc-rank-of">of ${total}</div>`;

    const pick = (ps, sLegacy, psKey, legacyKey, legacyRankKey) => {
      if (ps && ps[psKey] !== undefined && ps[psKey] !== null) {
        return { v: ps[psKey], r: ps.ranks ? ps.ranks[psKey] : null, total: TOTAL };
      }
      return { v: sLegacy[legacyKey], r: sLegacy[legacyRankKey], total: TOTAL_FBS };
    };

    const winsOf = (team, ps) => {
      if (ps) return { v: ps.record.wins.toLocaleString(), r: ps.ranks.wins, total: TOTAL };
      const e = wr.rank[team];
      return { v: e ? e.value : null, r: e ? e.rank : null, total: wr.total };
    };
    const pctOf = (team, ps) => {
      if (ps) return { v: fmtPct(ps.winPct), r: ps.ranks.winPct, total: TOTAL };
      const e = pr.rank[team];
      return { v: e ? fmtPct(e.value) : null, r: e ? e.rank : null, total: pr.total };
    };

    const rows = [
      { title: 'All-Time Win %',
        a: pctOf(t1, ps1), b: pctOf(t2, ps2) },
      { title: 'Total Wins',
        a: winsOf(t1, ps1), b: winsOf(t2, ps2) },
      { title: 'National Championships (Claimed)',
        a: pick(ps1, s1, 'claimedNatChamps', 'ncClaimed', 'ncClaimedRank'),
        b: pick(ps2, s2, 'claimedNatChamps', 'ncClaimed', 'ncClaimedRank') },
      { title: 'National Championships (Recognized)',
        a: pick(ps1, s1, 'recognizedNatChamps', 'ncRecognized', 'ncRecognizedRank'),
        b: pick(ps2, s2, 'recognizedNatChamps', 'ncRecognized', 'ncRecognizedRank') },
      { title: 'Conference Championships',
        a: pick(ps1, s1, 'confChamps', 'confChamps', 'confChampsRank'),
        b: pick(ps2, s2, 'confChamps', 'confChamps', 'confChampsRank') },
      { title: 'Bowl Games',
        a: pick(ps1, s1, 'bowlAppearances', 'bowlGames', 'bowlGamesRank'),
        b: pick(ps2, s2, 'bowlAppearances', 'bowlGames', 'bowlGamesRank') },
      { title: 'Consensus All-Americans',
        a: pick(ps1, s1, 'allAmericans', 'allAmericans', 'allAmericansRank'),
        b: pick(ps2, s2, 'allAmericans', 'allAmericans', 'allAmericansRank') },
      { title: 'Heisman Winners',
        a: pick(ps1, s1, 'heismanWinners', 'heismans', 'heismansRank'),
        b: pick(ps2, s2, 'heismanWinners', 'heismans', 'heismansRank') },
      { title: 'NFL Draft Picks',
        a: pick(ps1, s1, 'nflDraftPicks', 'nflPicks', 'nflPicksRank'),
        b: pick(ps2, s2, 'nflDraftPicks', 'nflPicks', 'nflPicksRank') },
      { title: 'First Round Draft Picks',
        a: pick(ps1, s1, 'firstRoundPicks', 'firstRound', 'firstRoundRank'),
        b: pick(ps2, s2, 'firstRoundPicks', 'firstRound', 'firstRoundRank') },
      { title: 'Weeks in AP Poll',
        a: pick(ps1, s1, 'weeksInPoll', 'weeksInAP', 'weeksInAPRank'),
        b: pick(ps2, s2, 'weeksInPoll', 'weeksInAP', 'weeksInAPRank') },
      { title: 'Weeks at #1',
        a: pick(ps1, s1, 'weeksAtOne', 'weeksAtNo1', 'weeksAtNo1Rank'),
        b: pick(ps2, s2, 'weeksAtOne', 'weeksAtNo1', 'weeksAtNo1Rank') }
    ];

    return `<div class="stat-comparison-section">
      <div class="chart-title">Program Comparison</div>
      <p class="stat-comparison-sub">All-time program totals with national rank</p>
      <div class="stat-comparison-grid">
        ${rows.map(s => `<div class="stat-card-compare">
          <div class="scc-title">${s.title}</div>
          <div class="scc-body">
            <div class="scc-side left" style="background:${t1Color}">
              ${valHtml(s.a.v)}
              ${rankHtml(s.a.r, s.a.total)}
            </div>
            <div class="scc-side" style="background:${t2Color}">
              ${valHtml(s.b.v)}
              ${rankHtml(s.b.r, s.b.total)}
            </div>
          </div>
        </div>`).join('')}
      </div>
    </div>`;
  }

  function drawCharts(games) {
    if (charts.margin) charts.margin.destroy();
    if (charts.lead) charts.lead.destroy();
    const sorted = [...games].sort((a,b)=>a.game_date.localeCompare(b.game_date));
    const t1Color = TEAM_META[state.team1]?.color || '#fe5c00';
    const t2Color = TEAM_META[state.team2]?.color || '#003594';
    const t1Abbr = TEAM_META[state.team1]?.abbr || state.team1;
    const t2Abbr = TEAM_META[state.team2]?.abbr || state.team2;
    const labels = sorted.map(g => g.season);

    const marginData = sorted.map(g => {
      if (g.is_tie) return 0;
      return g.winner === state.team1 ? Math.abs(g.margin) : -Math.abs(g.margin);
    });
    charts.margin = new Chart(document.getElementById('marginChart'), {
      type: 'bar',
      data: { labels, datasets: [{ data: marginData, backgroundColor: marginData.map(v => v>=0?t1Color:t2Color), borderWidth: 0 }] },
      options: {
        responsive: true, maintainAspectRatio: true,
        plugins: { legend:{display:false}, tooltip:{callbacks:{label:ctx=>{
          const v=ctx.raw; if(v===0)return'Tie'; return `${v>0?state.team1:state.team2} by ${Math.abs(v)}`;
        }}}},
        scales: { x:{ticks:{maxTicksLimit:12},grid:{display:false}}, y:{title:{display:true,text:`\u2190 ${t2Abbr}    |    ${t1Abbr} \u2192`}} }
      }
    });

    // Dual win-% line chart: each team's season-by-season winning % across ALL their games
    drawWinPctChart(t1Color, t2Color);
  }

  // Build per-season win% for a team from the full dataset (all opponents)
  function seasonWinPct(team) {
    const bySeason = {};
    GAMES.forEach(g => {
      if (g.team_a !== team && g.team_b !== team) return;
      const s = g.season;
      const r = bySeason[s] = bySeason[s] || {w:0,l:0,t:0};
      if (g.is_tie) r.t++;
      else if (g.winner === team) r.w++;
      else r.l++;
    });
    return bySeason;
  }

  function drawWinPctChart(t1Color, t2Color) {
    if (charts.winpct) charts.winpct.destroy();
    const s1 = seasonWinPct(state.team1);
    const s2 = seasonWinPct(state.team2);
    // shared season axis, clamped to the active year range
    const allSeasons = [...new Set([...Object.keys(s1), ...Object.keys(s2)].map(Number))]
      .filter(y => y >= state.startYear && y <= state.endYear)
      .sort((a,b)=>a-b);

    const recordOf = (bySeason, yr) => {
      const r = bySeason[yr];
      if (!r) return null;
      const tot = r.w+r.l+r.t;
      return { pct: tot ? (r.w + r.t*0.5)/tot : null, rec: `${r.w}-${r.l}${r.t?'-'+r.t:''}` };
    };
    const d1 = allSeasons.map(yr => { const x = recordOf(s1,yr); return x?x.pct:null; });
    const d2 = allSeasons.map(yr => { const x = recordOf(s2,yr); return x?x.pct:null; });
    const rec1 = allSeasons.map(yr => { const x = recordOf(s1,yr); return x?x.rec:''; });
    const rec2 = allSeasons.map(yr => { const x = recordOf(s2,yr); return x?x.rec:''; });

    charts.winpct = new Chart(document.getElementById('winPctChart'), {
      type: 'line',
      data: { labels: allSeasons, datasets: [
        { label: state.team1, data: d1, borderColor: t1Color, backgroundColor: 'transparent',
          fill: false, tension: 0.35, pointRadius: 0, pointHoverRadius: 5,
          pointHoverBackgroundColor: t1Color, pointHoverBorderColor: '#fff', pointHoverBorderWidth: 2,
          borderWidth: 2.5, spanGaps: true, _recs: rec1 },
        { label: state.team2, data: d2, borderColor: t2Color, backgroundColor: 'transparent',
          fill: false, tension: 0.35, pointRadius: 0, pointHoverRadius: 5,
          pointHoverBackgroundColor: t2Color, pointHoverBorderColor: '#fff', pointHoverBorderWidth: 2,
          borderWidth: 2.5, spanGaps: true, _recs: rec2 }
      ]},
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: true, position: 'bottom',
            labels: { usePointStyle: true, pointStyle: 'line', boxWidth: 28, padding: 18,
              font: { size: 13, weight: '600' } } },
          tooltip: {
            mode: 'index', intersect: false,
            backgroundColor: 'rgba(13,17,23,0.92)', padding: 10, cornerRadius: 6,
            titleFont: { size: 13, weight: '700' }, bodyFont: { size: 12 },
            callbacks: {
              title: items => items.length ? `Season ${items[0].label}` : '',
              label: ctx => {
                const rec = ctx.dataset._recs[ctx.dataIndex] || 'did not play';
                const pct = ctx.raw==null ? '' : '  (.'+(ctx.raw*1000).toFixed(0)+')';
                return `  ${ctx.dataset.label}: ${rec}${pct}`;
              }
            }
          }
        },
        scales: {
          x: {
            ticks: { maxTicksLimit: 10, maxRotation: 0, autoSkip: true,
              font: { size: 11 }, color: '#6b7280' },
            grid: { display: false },
            border: { color: '#e5e7eb' }
          },
          y: {
            min: 0, max: 1,
            ticks: { stepSize: 0.25, callback: v => (v*100)+'%',
              font: { size: 11 }, color: '#6b7280' },
            grid: { color: '#f0f0f0' },
            border: { display: false }
          }
        }
      }
    });
  }


</script>
</body>
